<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Capture Memories</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1;
            cursor: pointer;
            transition: var(--transition);
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .gallery-image {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: var(--transition);
        }

        .gallery-item:hover .gallery-image {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .gallery-item:hover .gallery-overlay {
            background: rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <a href="../index.html" class="logo">
                    <img src="../assets/images/logo.png" alt="Capture Memories" class="logo-img">
                </a>
                <div class="nav-toggle" id="navToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <ul class="nav-menu" id="navMenu">
                    <li><a href="../index.html" class="nav-link">Home</a></li>
                    <li><a href="destinations.html" class="nav-link">Destinations</a></li>
                    <li><a href="stories.html" class="nav-link">Stories</a></li>
                    <li><a href="gallery.html" class="nav-link active">Gallery</a></li>
                    <li><a href="about.html" class="nav-link">About</a></li>
                    <li><a href="contact.html" class="nav-link">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="hero" style="margin-top: 60px; height: 400px; background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);">
        <div class="hero-content">
            <h1 class="hero-title fade-in-up">Captured Photos</h1>
            <p class="hero-subtitle fade-in-up" style="animation-delay: 0.2s;">Beautiful moments captured around the world</p>
        </div>
        <div class="hero-overlay"></div>
    </section>

    <!-- Gallery -->
    <section class="section">
        <div class="container">
            <div class="gallery-grid">
                <div class="gallery-item" data-aos="fade-up">
                    <div class="gallery-image" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
                    <div class="gallery-overlay">Mountain View</div>
                </div>
                <div class="gallery-item" data-aos="fade-up">
                    <div class="gallery-image" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></div>
                    <div class="gallery-overlay">Ocean Sunset</div>
                </div>
                <div class="gallery-item" data-aos="fade-up">
                    <div class="gallery-image" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);"></div>
                    <div class="gallery-overlay">Beach Paradise</div>
                </div>
                <div class="gallery-item" data-aos="fade-up">
                    <div class="gallery-image" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);"></div>
                    <div class="gallery-overlay">Desert Dunes</div>
                </div>
                <div class="gallery-item" data-aos="fade-up">
                    <div class="gallery-image" style="background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);"></div>
                    <div class="gallery-overlay">City Lights</div>
                </div>
                <div class="gallery-item" data-aos="fade-up">
                    <div class="gallery-image" style="background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);"></div>
                    <div class="gallery-overlay">Forest Walk</div>
                </div>
                <div class="gallery-item" data-aos="fade-up">
                    <div class="gallery-image" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
                    <div class="gallery-overlay">Temple Serenity</div>
                </div>
                <div class="gallery-item" data-aos="fade-up">
                    <div class="gallery-image" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></div>
                    <div class="gallery-overlay">Aurora Nights</div>
                </div>
                <div class="gallery-item" data-aos="fade-up">
                    <div class="gallery-image" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);"></div>
                    <div class="gallery-overlay">Island Paradise</div>
                </div>
            </div>
        </div>
    </section>

</html>
